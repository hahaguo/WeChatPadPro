version: '3.8'

services:
  wechatpadpro:
    build:
      context: .
      dockerfile: Dockerfile.all-in-one
    image: wechatpadpro:all-in-one
    container_name: wechatpadpro-all-in-one
    restart: unless-stopped
    ports:
      - "3306:3306"
      - "6379:6379"
      - "9876:9876"
      - "10911:10911"
      - "10909:10909"
      - "8080:8080"
      - "1238:1238"
      - "8099:8099"
    environment:
      # ========== 基础系统配置 ==========
      - HOST=0.0.0.0
      - PORT=1238
      - DEBUG=true
      - ADMIN_KEY=${ADMIN_KEY:-7Kf9mP2xR5nQ8sV3wY6zA1bC4dE7gH0j}
      - VERSION=1.0.0
      - API_VERSION=
      - MCP_PORT=8099
      - GH_WXID=
      - TZ=Asia/Shanghai

      # ========== MySQL 配置 ==========
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-9mK2pR5nQ8sV3wY6zA1bC4dE7gH0jM3p}
      - MYSQL_DATABASE=weixin
      - MYSQL_USER=weixin
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-5nQ8sV3wY6zA1bC4dE7gH0jM3pR6tS9v}
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_USERNAME=weixin
      - DB_DATABASE=weixin
      - DB_PASSWORD=${MYSQL_PASSWORD:-5nQ8sV3wY6zA1bC4dE7gH0jM3pR6tS9v}
      - MYSQL_CONNECT_STR=weixin:${MYSQL_PASSWORD:-5nQ8sV3wY6zA1bC4dE7gH0jM3pR6tS9v}@tcp(127.0.0.1:3306)/weixin?charset=utf8mb4&parseTime=true&loc=Local
      - MYSQL_MAX_OPEN_CONN=100
      - MYSQL_MAX_IDLE_CONN=10
      - MYSQL_MAX_LIFETIME=1h

      # ========== Redis 配置 ==========
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - REDIS_PASS=${REDIS_PASS:-8sV3wY6zA1bC4dE7gH0jM3pR6tS9vW2yK}
      - REDIS_DB=1
      - REDIS_MAX_IDLE=30
      - REDIS_MAX_ACTIVE=100
      - REDIS_IDLE_TIMEOUT=5000
      - REDIS_MAX_CONN_LIFETIME=3600
      - REDIS_CONNECT_TIMEOUT=5000
      - REDIS_READ_TIMEOUT=10000
      - REDIS_WRITE_TIMEOUT=10000
      - REDIS_POOL_SIZE=10
      - REDIS_MIN_IDLE_CONN=5
      - REDIS_MAX_RETRIES=3
      - REDIS_DIAL_TIMEOUT=5s
      - REDIS_READ_TIMEOUT_SEC=3s
      - REDIS_WRITE_TIMEOUT_SEC=3s

      # ========== Webhook 配置 ==========
      - WEBHOOK_ENABLED=true
      - WEBHOOK_TIMEOUT=10
      - WEBHOOK_MAX_RETRIES=3
      - WEBHOOK_QUEUE_SIZE=1000
      - WEBHOOK_BATCH_SIZE=20
      - WEBHOOK_DIRECT_STREAM=true

      # ========== WebSocket 配置 ==========
      - WS_HANDSHAKE_TIMEOUT=10
      - WS_READ_BUFFER_SIZE=4096
      - WS_WRITE_BUFFER_SIZE=4096
      - WS_READ_DEADLINE=120
      - WS_WRITE_DEADLINE=60
      - WS_PING_INTERVAL=25
      - WS_CONNECTION_CHECK_INTERVAL=45
      - WS_MAX_MESSAGE_SIZE=8192

      # ========== Worker 配置 ==========
      - WORKER_POOL_SIZE=500
      - MAX_WORKER_TASK_LEN=1000
      - TASK_EXEC_WAIT_TIMES=500

      # ========== Auth 配置 ==========
      - TOKEN_EXPIRE=24h
      - REFRESH_EXPIRE=168h
      - AUTO_AUTH_INTERVAL=30m

      # ========== Web 配置 ==========
      - WEB_DOMAIN=localhost:1238
      - WEB_TASK_NAME=
      - WEB_TASK_APP_NUMBER=
      - NEWS_SYN_WXID=true
      - DT=true

      # ========== 消息队列配置 ==========
      - TOPIC=wx_sync_msg_topic
      - ROCKET_MQ_ENABLED=true
      - ROCKET_MQ_HOST=127.0.0.1:9876
      - ROCKET_ACCESS_KEY=${ROCKET_ACCESS_KEY:-2pR6tS9vW2yK5nQ8sV3wY6zA1bC4dE7gH}
      - ROCKET_SECRET_KEY=${ROCKET_SECRET_KEY:-4dE7gH0jM3pR6tS9vW2yK5nQ8sV3wY6zA1bC!@#}
      - RABBIT_MQ_ENABLED=false
      - RABBIT_MQ_URL=${RABBIT_MQ_URL:-amqp://user:6tS9vW2yK5nQ8sV3wY6zA1bC4dE7gH0jM3p@127.0.0.1:5672/}
      - KAFKA_ENABLED=false
      - KAFKA_URL=
      - KAFKA_USERNAME=
      - KAFKA_PASSWORD=

      # ========== 任务配置 ==========
      - TASK_RETRY_COUNT=3
      - TASK_RETRY_INTERVAL=5
      - HEARTBEAT_INTERVAL=25
      - AUTO_SYNC_INTERVAL_MINUTES=30
      - QUEUE_EXPIRE_TIME=86400

      # ========== 集群配置 ==========
      - CLUSTER_NAME=
      - ZK_ADDR=
      - ETCD_ADDR=

      # ========== 禁用命令配置 ==========
      - DISABLED_CMD_LIST=

    volumes:
      # 数据持久化
      - mysql_data:/var/lib/mysql
      - redis_data:/var/lib/redis
      # 日志
      - app_logs:/app/logs
      # 配置文件（可选）
      - ./.env:/app/.env:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1238/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - wechatpadpro-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local

networks:
  wechatpadpro-network:
    driver: bridge
[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisord
user=root

[program:mysql]
command=/usr/bin/mysqld_safe --user=mysql
autostart=true
autorestart=true
priority=1
stdout_logfile=/var/log/mysql/supervisord.log
stderr_logfile=/var/log/mysql/supervisord_err.log

[program:redis]
command=/usr/bin/redis-server /etc/redis.conf
autostart=true
autorestart=true
priority=2
stdout_logfile=/var/log/redis/supervisord.log
stderr_logfile=/var/log/redis/supervisord_err.log

[program:rocketmq-namesrv]
command=/opt/rocketmq/bin/mqnamesrv
autostart=true
autorestart=true
priority=3
stdout_logfile=/var/log/rocketmq/namesrv.log
stderr_logfile=/var/log/rocketmq/namesrv_err.log
environment=JAVA_HOME="/usr/lib/jvm/default-jvm"

[program:rocketmq-broker]
command=/opt/rocketmq/bin/mqbroker -c /opt/rocketmq/conf/broker.properties
autostart=true
autorestart=true
priority=4
stdout_logfile=/var/log/rocketmq/broker.log
stderr_logfile=/var/log/rocketmq/broker_err.log
environment=JAVA_HOME="/usr/lib/jvm/default-jvm"
depends_on=rocketmq-namesrv

[program:wechatpadpro]
command=/app/docker-entrypoint.sh wechatpadpro
autostart=true
autorestart=true
priority=5
directory=/app
stdout_logfile=/app/logs/wechatpadpro.log
stderr_logfile=/app/logs/wechatpadpro_err.log

[program:init-mysql]
command=/app/init-mysql.sh
autostart=true
autorestart=false
priority=0
startsecs=0
stdout_logfile=/var/log/mysql/init.log
stderr_logfile=/var/log/mysql/init_err.log